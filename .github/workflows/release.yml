name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
            artifact: hermes-linux-amd64

          - os: ubuntu-latest
            goos: linux
            goarch: arm64
            artifact: hermes-linux-arm64

          - os: macos-latest
            goos: darwin
            goarch: amd64
            artifact: hermes-darwin-amd64

          - os: macos-latest
            goos: darwin
            goarch: arm64
            artifact: hermes-darwin-arm64

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Build
        run: |
          mkdir -p dist
          go build \
            -o dist/${{ matrix.artifact }} \
            ./cmd/hermes

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v5
        with:
          path: release-artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-artifacts/**/*
